name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5
        id: pages

      - name: Install dependencies
        run: bun install

      - name: Build for GitHub Pages
        run: bunx vite build --config vite.config.gh.ts
        env:
          GH_PAGES_BASE: ${{ steps.pages.outputs.base_path }}

      - name: Move index.html to root
        run: |
          mv dist/gh-pages/index.html dist/index.html
          rmdir dist/gh-pages 2>/dev/null || rm -rf dist/gh-pages

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "dist/index.html not found" && exit 1)
          echo "Build output verified at dist/index.html"


      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

